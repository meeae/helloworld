<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f3f4f6;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .profile-card {
      display: flex;              /* Flexbox (Auto Layout 느낌) */
      flex-direction: column;
      gap: 16px;                  /* 요소 간 간격 */
      padding: 24px;              /* 카드 전체 패딩 */
      background: #ffffff;
      border-radius: 12px;        /* Corner Radius */
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      width: min(360px, calc(100vw - 48px));
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 999px;
      flex: 0 0 auto;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.14);
      object-fit: cover;
      display: block;
      background: #e5e7eb;
    }

    .profile-main {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1 1 auto;
      min-width: 0;
    }

    .profile-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: #111827;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile-role {
      font-size: 1rem;
      font-weight: 500;
      color: #6b7280;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(17, 24, 39, 0.12);
      background: #ffffff;
      color: #111827;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      font-size: 0.95rem;
      line-height: 1;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
      white-space: nowrap;
    }

    .btn:hover {
      background: #f9fafb;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.10);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;            /* Auto Layout처럼 내용이 늘면 줄바꿈 */
      gap: 8px;
      align-items: center;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      border: 1px solid rgba(17, 24, 39, 0.06);
      font-weight: 600;
      font-size: 0.85rem;
      line-height: 1;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <section class="profile-card" aria-label="프로필 카드">
    <header class="profile-header">
      <img class="avatar" src="images/avatar.png" alt="사용자 아바타" />

      <div class="profile-main">
        <div class="profile-name">이미애</div>
        <div class="profile-role">UI/UX 디자이너</div>
      </div>

      <div class="profile-actions">
        <button class="btn" type="button">팔로우</button>
      </div>
    </header>

    <div class="tags" aria-label="태그 목록">
      <span class="tag">#프로덕트</span>
      <span class="tag">#리서치</span>
      <span class="tag">#프로토타이핑</span>
      <span class="tag">#디자인시스템</span>
      <span class="tag">#접근성</span>
    </div>
  </section>
</body>
</html>
